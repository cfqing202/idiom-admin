  PLATFORM = 'wechat';
} else if (typeof qg !== 'undefined' && qg.getSystemInfoSync) {
  PLATFORM = 'vivo';

var tt = {
  createCanvas: function() {
    if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
      return qg.createCanvas();
    }
    return document.getElementById('gameCanvas');
  },
  setPreferredFramesPerSecond: function(fps) {
    console.log('[Platform:' + PLATFORM + '] setPreferredFramesPerSecond:', fps);
  },
  getSystemInfoSync: function() {
    if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
      var info = qg.getSystemInfoSync();
      return {
        pixelRatio: info.pixelRatio || 2,
        windowWidth: info.windowWidth || 375,
        windowHeight: info.windowHeight || 667,
        screenWidth: info.screenWidth || 375,
        screenHeight: info.screenHeight || 667,
        safeArea: info.safeArea || { top: 0, bottom: 0, left: 0, right: 0 }
      };
    }
    var safeArea = { top: 0, bottom: 0, left: 0, right: 0 };
    if (window.visualViewport) {
      safeArea.top = window.visualViewport.offsetTop || 0;
    }
    if (CSS && CSS.supports('padding-top: env(safe-area-inset-top)')) {
      safeArea.top = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sat') || '0') || 
                     (window.innerHeight - document.documentElement.clientHeight);
      safeArea.bottom = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sab') || '0') || 0;
    }
    return {
      pixelRatio: window.devicePixelRatio || 2,
      windowWidth: window.innerWidth,
      windowHeight: window.innerHeight,
      screenWidth: window.screen.width,
      screenHeight: window.screen.height,
      safeArea: safeArea
    };
  },
  onTouchStart: function(callback) {
    if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
      qg.onTouchStart(callback);
      return;
    }
    const canvas = document.getElementById('gameCanvas');
    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      if (e.touches.length > 0) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        callback({
          touches: [{
            clientX: touch.clientX - rect.left,
            clientY: touch.clientY - rect.top
          }]
        });
      }
    }, { passive: false });
    canvas.addEventListener('click', function(e) {
      const rect = canvas.getBoundingClientRect();
      callback({
        touches: [{
          clientX: e.clientX - rect.left,
          clientY: e.clientY - rect.top
        }]
      });
    });
  },
  request: function(options) {
    console.log('[Platform:' + PLATFORM + '] tt.request:', options.url);
    if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
      return qg.request(options);
    }
    if (options.success) {
      options.success({ statusCode: 200, data: { code: 0, message: 'ok', data: null } });
    }
    return { errMsg: 'ok' };
  },
  showToast: function(options) {
    console.log('[Platform:' + PLATFORM + '] toast:', options.title);
    if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
      qg.showToast({ title: options.title, icon: 'none' });
      return;
    }
  },
  createRewardedVideoAd: function(options) {
    console.log('[Platform:' + PLATFORM + '] createRewardedVideoAd:', options.adUnitId);
    if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
      var ad = qg.createRewardedVideoAd({ adUnitId: options.adUnitId });
      return {
        on: function(event, callback) {
          ad.on(event, callback);
          return this;
        },
        off: function(event, callback) {
          ad.off(event, callback);
          return this;
        },
        show: function() {
          return ad.show();
        },
        load: function() {
          return ad.load();
        }
      };
    }
    return {
      on: function() { return this; },
      off: function() { return this; },
      show: function() { return Promise.resolve(); },
      load: function() { return Promise.resolve(); }
    };
  },
  login: function(options) {
    console.log('[Platform:' + PLATFORM + '] login');
    if (PLATFORM === 'wechat' && typeof wx !== 'undefined') {
      wx.login({
        success: function(res) {
          if (options.success) options.success({ code: res.code });
        },
        fail: function(err) {
          if (options.fail) options.fail(err);
        }
      });
      return;
    }
    if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
      qg.login({
        success: function(res) {
          if (options.success) options.success(res);
        },
        fail: function(err) {
          if (options.fail) options.fail(err);
        }
      });
      return;
    }
    if (options.success) {
      options.success({ code: 'mock_code_' + Date.now() });
    }
  }
};

function loadIdiomsFromSupabase(callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', SUPABASE_URL + '/rest/v1/idioms?select=*&limit=500', true);
  xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (data && data.length > 0) {
            idiomDatabase = data.map(function(item) {
              return {
                idiom: item.idiom,
                meaning: item.explanation || '',
                difficulty: item.difficulty || 1
              };
            });
            console.log('从Supabase加载了 ' + idiomDatabase.length + ' 条成语数据');
            if (callback) callback(true);
          } else {
            useLocalIdioms();
            if (callback) callback(false);
          }
        } catch (e) {
          console.error('解析成语数据失败:', e);
          useLocalIdioms();
          if (callback) callback(false);
        }
      } else {
        console.error('加载成语数据失败:', xhr.status);
        useLocalIdioms();
        if (callback) callback(false);
      }
    }
  };
  xhr.onerror = function() {
    console.error('网络错误：无法连接到Supabase加载成语数据，使用本地备用数据');
    useLocalIdioms();
    if (callback) callback(false);
  };
  xhr.send();
}

function useLocalIdioms() {
  if (idiomDatabase.length === 0) {
    idiomDatabase = LOCAL_IDIOMS.slice();
    console.log('使用本地备用成语库：' + idiomDatabase.length + ' 条成语数据');
  }
}

function saveUserToSupabase(userInfo, callback) {
  var xhr = new XMLHttpRequest();
  xhr.open('POST', SUPABASE_URL + '/rest/v1/users', true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('apikey', SUPABASE_ANON_KEY);
  xhr.setRequestHeader('Authorization', 'Bearer ' + SUPABASE_ANON_KEY);
  xhr.setRequestHeader('Prefer', 'return=representation');
  xhr.onreadystatechange = function() {
    if (xhr.readyState === 4) {
      if (xhr.status === 201 || xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (callback) callback(data[0] || data);
        } catch (e) {
          if (callback) callback(null);
        }
      } else {
        if (callback) callback(null);
      }
    }
  };
  xhr.onerror = function() {
    console.error('网络错误：无法保存用户信息到Supabase');
    if (callback) callback(null);
  };
  xhr.send(JSON.stringify({
    openid: userInfo.openid,
    unionid: userInfo.unionid || '',
    nickname: userInfo.nickname || '玩家',
    avatar_url: userInfo.avatarUrl || '',
    user_status: 0,
    identity_level: 0,
    total_points: userInfo.totalPoints || 0,
    ad_contribution_score: 0
  }));
}

function setState(updates) {
  Object.assign(state, updates);
  
  // 自动保存到 localStorage
  if (typeof Storage !== 'undefined' && Storage.save) {
    try {
      Storage.save();
    } catch(e) {}
  }
}

function shuffleChars(chars) {
  var arr = chars.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = arr[i];
    arr[i] = arr[j];
    arr[j] = temp;
  }
  return arr;
}

function getRandomQuestions(n) {
  var shuffled = idiomDatabase.slice().sort(function() { return Math.random() - 0.5; });
  return shuffled.slice(0, n).map(function(item, idx) {
    return {
      questionId: 'local_' + Date.now() + '_' + idx,
      idiom: item.idiom,
      idioms: item.idiom.split(''),
      meaning: item.meaning
    };
  });
}

function getEffectiveConsecutiveA(results) {
  var count = 0;
  for (var i = results.length - 1; i >= 0; i--) {
    if (results[i] === SessionResultFlag.PASS) {
      count++;
    } else if (results[i] === SessionResultFlag.REVIVE || results[i] === SessionResultFlag.REVIVE_PASS) {
      continue;
    } else {
      break;
    }
  }
  return count;
}

function getIdentityLevelByDays(days) {
  for (var i = IDENTITY_THRESHOLDS.length - 1; i >= 0; i--) {
    if (days >= IDENTITY_THRESHOLDS[i]) {
      return i;
    }
  }
  return 0;
}

function calculateMonthlyPassedDays() {
  var passed = 0;
  var history = state.dailyChallengeHistory || [];
  for (var i = 0; i < history.length; i++) {
    if (history[i].passed) {
      passed++;
    }
  }
  return passed;
}

function startSession(withBoost) {
  var qs = getRandomQuestions(5);
  if (qs.length === 0) {
    console.error('无法获取题目：成语库为空');
    showToast({ title: '题目加载失败，请稍后再试' });
    return;
  }
  var baseTime = 10 - state.sessionIndex;
  if (baseTime < 6) baseTime = 6;
  var actualTime = withBoost ? baseTime * 2 : baseTime;
  var firstQ = qs[0];

  setState({
    showBoostDialog: false,
    screen: 'game',
    gameStatus: GameStatus.PLAYING,
    sessionId: 'local_' + Date.now(),
    currentScore: 0,
    correctCount: 0,
    timer: actualTime,
    maxTime: actualTime,
    skipCount: 3,
    hasBoost: withBoost,
    canUseTimeDouble: true,
    timeDoubleRemaining: withBoost ? state.timeDoubleRemaining - 1 : state.timeDoubleRemaining,
    questions: qs,
    currentQuestionIndex: 0,
    selectedChars: [null, null, null, null],
    shuffledOptions: shuffleChars(firstQ.idioms),
    isAnswerCorrect: null,
    isShaking: false
  });

  startTimer();
}

function useBoost() {
  if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
    showRewardAd(function(success) {
      if (success) {
        startSession(true);
      } else {
        showToast({ title: '请完整观看广告' });
      }
    });
  } else {
    startSession(true);
  }
}

function skipBoost() {
  startSession(false);
}

function selectChar(ch, optIndex) {
  if (state.isAnswerCorrect !== null) return;

  var emptySlot = -1;
  for (var i = 0; i < state.selectedChars.length; i++) {
    if (state.selectedChars[i] === null) {
      emptySlot = i;
      break;
    }
  }
  if (emptySlot === -1) return;

  var newSelected = state.selectedChars.slice();
  newSelected[emptySlot] = ch;

  var newOptions = state.shuffledOptions.slice();
  newOptions[optIndex] = '';

  setState({
    selectedChars: newSelected,
    shuffledOptions: newOptions
  });

  var allFilled = true;
  for (var k = 0; k < newSelected.length; k++) {
    if (newSelected[k] === null) {
      allFilled = false;
      break;
    }
  }
  if (allFilled) {
    submitAnswer(newSelected);
  }
}

function submitAnswer(answer) {
  var currentQ = state.questions[state.currentQuestionIndex];
  var userAnswer = answer.join('');
  var correctAnswer = currentQ.idioms.join('');

  if (userAnswer === correctAnswer) {
    onAnswerCorrect(1);
  } else {
    onAnswerWrong();
  }
}

function onAnswerCorrect(points) {
  var newCorrect = state.correctCount + 1;
  var newScore = state.currentScore + points;

  setState({
    gameStatus: GameStatus.ANSWER_CORRECT,
    isAnswerCorrect: true,
    correctCount: newCorrect,
    currentScore: newScore,
    scorePopup: { text: '+' + points, opacity: 1 }
  });

  setTimeout(function() { setState({ scorePopup: null }); }, 1000);

  if (newCorrect >= 5) {
    setTimeout(function() { onSessionEnd(false); }, 800);
  } else {
    setTimeout(function() { nextQuestion(); }, 800);
  }
}

function onAnswerWrong() {
  setState({
    gameStatus: GameStatus.ANSWER_WRONG,
    isAnswerCorrect: false,
    isShaking: true
  });

  setTimeout(function() {
    setState({
      isShaking: false,
      isAnswerCorrect: null,
      gameStatus: GameStatus.PLAYING,
      selectedChars: [null, null, null, null],
      shuffledOptions: shuffleChars(state.questions[state.currentQuestionIndex].idioms)
    });
  }, 600);
}

function removeChar(slotIndex) {
  if (state.isAnswerCorrect !== null) return;

  var ch = state.selectedChars[slotIndex];
  if (ch === null) return;

  var newSelected = state.selectedChars.slice();
  newSelected[slotIndex] = null;

  var newOptions = state.shuffledOptions.slice();
  var emptyIdx = -1;
  for (var i = 0; i < newOptions.length; i++) {
    if (newOptions[i] === '') { emptyIdx = i; break; }
  }
  if (emptyIdx !== -1) { newOptions[emptyIdx] = ch; }

  setState({ selectedChars: newSelected, shuffledOptions: newOptions });
}

function skipQuestion() {
  if (state.skipCount <= 0) return;

  var newQuestions = state.questions.slice();
  var newQ = getRandomQuestions(1)[0];
  newQuestions[state.currentQuestionIndex] = newQ;

  setState({
    skipCount: state.skipCount - 1,
    questions: newQuestions,
    selectedChars: [null, null, null, null],
    shuffledOptions: shuffleChars(newQ.idioms),
    isAnswerCorrect: null,
    isShaking: false
  });
}

function nextQuestion() {
  stopTimer();
  var nextIdx = state.currentQuestionIndex + 1;
  if (nextIdx >= state.questions.length) return;

  var nextQ = state.questions[nextIdx];
  var baseTime = 10 - state.sessionIndex;
  if (baseTime < 6) baseTime = 6;
  var newTimer = state.hasBoost ? baseTime * 2 : baseTime;

  setState({
    currentQuestionIndex: nextIdx,
    selectedChars: [null, null, null, null],
    shuffledOptions: shuffleChars(nextQ.idioms),
    isAnswerCorrect: null,
    isShaking: false,
    gameStatus: GameStatus.PLAYING,
    timer: newTimer,
    maxTime: newTimer
  });
  
  startTimer();
}

function onSessionEnd(isTimeout) {
  stopTimer();

  var isPassed = !isTimeout && state.correctCount >= 5;
  var newTotalPoints = state.userInfo.totalPoints + state.currentScore;
  var newDailyResults = state.dailyStatus.sessionResults.slice();
  var newTotalSessions = state.dailyStatus.totalSessions + 1;
  var localCanRevive = isTimeout && state.reviveRemaining > 0;

  if (isPassed) {
    newDailyResults.push(SessionResultFlag.PASS);
    var consecutiveA = getEffectiveConsecutiveA(newDailyResults);
    var dailyPassed = consecutiveA >= 5;

    setState({
      gameStatus: GameStatus.SESSION_OVER,
      showVictoryDialog: true,
      canRevive: false,
      userInfo: Object.assign({}, state.userInfo, { totalPoints: newTotalPoints }),
      dailyStatus: Object.assign({}, state.dailyStatus, {
        sessionResults: newDailyResults,
        totalSessions: newTotalSessions,
        dailyPassed: dailyPassed
      })
    });

    if (dailyPassed) {
      var today = new Date().toISOString().split('T')[0];
      var newHistory = (state.dailyChallengeHistory || []).concat([{ date: today, passed: true }]);
      setState({ showDailySuccessDialog: true, dailyChallengeHistory: newHistory });
    }
  } else {
    setState({
      gameStatus: GameStatus.TIME_UP,
      showFailureDialog: true,
      canRevive: localCanRevive,
      userInfo: Object.assign({}, state.userInfo, { totalPoints: newTotalPoints }),
      dailyStatus: Object.assign({}, state.dailyStatus, {
        totalSessions: newTotalSessions
      })
    });
  }
}

function revive() {
  if (PLATFORM === 'vivo' && typeof qg !== 'undefined') {
    if (state.reviveRemaining <= 0) {
      showToast({ title: '今日复活次数已用完' });
      return;
    }
    showRewardAd(function(success) {
      if (success) {
        setState({
          showFailureDialog: false,
          reviveRemaining: state.reviveRemaining - 1,
          dailyStatus: Object.assign({}, state.dailyStatus, {
            sessionResults: state.dailyStatus.sessionResults.concat([SessionResultFlag.REVIVE_PASS])
          })
        });
        state.sessionIndex += 1;
        startSession(false);
      } else {
        showToast({ title: '请完整观看广告' });
      }
    });
  } else {
    setState({
      showFailureDialog: false,
      reviveRemaining: state.reviveRemaining - 1,
      dailyStatus: Object.assign({}, state.dailyStatus, {
        sessionResults: state.dailyStatus.sessionResults.concat([SessionResultFlag.REVIVE])
      })
    });
    state.sessionIndex += 1;
    startSession(false);
  }
}

function returnHome() {

function playAgain() {
  state.sessionIndex += 1;
  stopTimer();

  if (state.canUseTimeDouble && state.timeDoubleRemaining > 0 && state.dailyStatus.totalSessions < 5) {
    setState({
      showBoostDialog: true,
      showVictoryDialog: false,
      showFailureDialog: false,
      showDailySuccessDialog: false,
      gameStatus: GameStatus.IDLE
    });
  } else {
    startSession(false);
    setState({
      showVictoryDialog: false,
      showFailureDialog: false,
      showDailySuccessDialog: false
    });
  }
}

var timerInterval = null;

var canvas, ctx, dpr, screenW, screenH, safeTop, safeBottom;
var touchRegions = [];

function clearTouchRegions() { touchRegions.length = 0; }
function addTouchRegion(x, y, w, h, cb) { touchRegions.push({ x: x, y: y, w: w, h: h, cb: cb }); }
function hitTest(tx, ty) {
  for (var i = touchRegions.length - 1; i >= 0; i--) {
    var r = touchRegions[i];
    if (tx >= r.x && tx <= r.x + r.w && ty >= r.y && ty <= r.y + r.h) { r.cb(); return true; }
  }
  return false;
}

function drawRoundRect(x, y, w, h, r, fill, stroke, lw) {
  r = Math.max(0, r || 0);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}

function drawGradientRect(x, y, w, h, r, colorStops, direction) {
  var grad;
  if (direction === 'horizontal') grad = ctx.createLinearGradient(x, y, x + w, y);
  else if (direction === 'diagonal') grad = ctx.createLinearGradient(x, y, x + w, y + h);
  else grad = ctx.createLinearGradient(x, y, x, y + h);
  for (var i = 0; i < colorStops.length; i++) grad.addColorStop(colorStops[i][0], colorStops[i][1]);
  drawRoundRect(x, y, w, h, r, grad);
}

function drawText(text, x, y, options) {
  options = options || {};
  var fs = options.fontSize || 14, color = options.color || COLORS.brown;
  var fw = options.fontWeight || 'normal', ta = options.textAlign || 'left';
  var bl = options.baseline || 'top', mw = options.maxWidth || null;
  ctx.font = fw + ' ' + fs + 'px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = color; ctx.textAlign = ta; ctx.textBaseline = bl;
  if (mw) ctx.fillText(text, x, y, mw); else ctx.fillText(text, x, y);
}

function drawCircle(cx, cy, r, fill, stroke, lw) {
  ctx.beginPath(); ctx.arc(cx, cy, Math.max(1, r), 0, Math.PI * 2);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 1; ctx.stroke(); }
}

function drawButton(x, y, w, h, text, options) {
  options = options || {};
  var bg = options.bgColor || COLORS.red, tc = options.textColor || COLORS.white;
  var fs = options.fontSize || 16, fw = options.fontWeight || 'bold', r = options.radius || 12, dis = options.disabled || false;

  if (dis) {
    drawRoundRect(x, y, w, h, r, 'rgba(0,0,0,0.06)');
    drawText(text, x + w / 2, y + h / 2, { fontSize: fs, color: COLORS.brownLight, fontWeight: fw, textAlign: 'center', baseline: 'middle' });
    return;
  }

  if (bg === COLORS.red) {
    drawRoundRect(x, y, w, h, r, '#E84118');
    drawGradientRect(x, y, w, h, r, [[0, '#FF6B35'], [0.5, '#E84118'], [1, '#C23616']], 'vertical');
  } else if (bg === COLORS.gold) {
    drawRoundRect(x, y, w, h, r, '#C49512');
    drawGradientRect(x, y, w, h, r, [[0, '#D4A017'], [1, '#B8860B']], 'vertical');
  } else { drawRoundRect(x, y, w, h, r, bg); }

  ctx.save(); ctx.globalAlpha = 0.15;
  drawGradientRect(x, y, w, h / 2, r, [[0, 'rgba(255,255,255,0.6)'], [1, 'transparent']], 'vertical');
  ctx.restore();

  drawText(text, x + w / 2, y + h / 2, { fontSize: fs, color: tc, fontWeight: fw, textAlign: 'center', baseline: 'middle' });
}

function drawWarmBackground() {
  var grad = ctx.createLinearGradient(0, 0, 0, screenH);
  grad.addColorStop(0, COLORS.bgTop); grad.addColorStop(0.5, COLORS.bgMid); grad.addColorStop(1, COLORS.bgBot);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, screenW, screenH);
  ctx.save(); ctx.globalAlpha = 0.12;
  var g1 = ctx.createRadialGradient(screenW * 0.85, 0, 0, screenW * 0.85, 0, 160);
  g1.addColorStop(0, '#FFD700'); g1.addColorStop(1, 'transparent');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, screenW, 300);
  ctx.restore();
}

function drawDarkBackground() {
  var grad = ctx.createLinearGradient(0, 0, 0, screenH);
  grad.addColorStop(0, COLORS.darkBg1); grad.addColorStop(0.3, COLORS.darkBg2); grad.addColorStop(1, COLORS.darkBg3);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, screenW, screenH);
}

function drawOverlay() {

function drawGameScreen() {
  drawWarmBackground(); clearTouchRegions();

  drawRoundRect(pad, top + 16, 36, 36, 18, 'rgba(255,255,255,0.5)');

  drawText('得分', screenW - pad - 92, top + 24, { fontSize: 10, color: COLORS.brownLight, textAlign: 'center' });

  drawRoundRect(screenW - pad - 56, top + 16, 48, 44, 10, 'rgba(255,255,255,0.5)');
  drawText('跳过', screenW - pad - 32, top + 24, { fontSize: 10, color: COLORS.brownLight, textAlign: 'center' });
  drawText(String(state.skipCount), screenW - pad - 32, top + 40, { fontSize: 18, fontWeight: 'bold', color: state.skipCount > 0 ? COLORS.brown : '#CCC', textAlign: 'center' });

  var progressY = top + 68;
  drawText('第' + (state.currentQuestionIndex + 1) + '/5题', screenW / 2, progressY, { fontSize: 12, color: COLORS.brownLight, textAlign: 'center' });
  var dotStartX = screenW / 2 - 80;
  for (var di = 0; di < 5; di++) {
    var dotX = dotStartX + di * 36;
    if (di < state.correctCount) drawGradientRect(dotX, progressY + 18, 28, 8, 4, [[0, '#FFD700'], [1, '#FFA500']], 'horizontal');
    else drawRoundRect(dotX, progressY + 18, 28, 8, 4, 'rgba(0,0,0,0.08)');
  }

  var timerCX = screenW / 2, timerCY = top + 170, timerR = 52;
  var isWarning = state.timer <= 3 && state.timer > 0;
  var timerColor = isWarning ? COLORS.errorRed : COLORS.gold;
  var timerPct = state.timer / state.maxTime;

  ctx.beginPath(); ctx.arc(timerCX, timerCY, timerR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 8; ctx.stroke();
  ctx.beginPath();
  ctx.arc(timerCX, timerCY, timerR, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * timerPct);
  ctx.strokeStyle = timerColor; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.stroke(); ctx.lineCap = 'butt';

  drawText(String(state.timer), timerCX, timerCY - 8, { fontSize: 42, fontWeight: 'bold', color: isWarning ? COLORS.errorRed : COLORS.brown, textAlign: 'center', baseline: 'middle' });
  drawText('秒', timerCX, timerCY + 22, { fontSize: 11, color: isWarning ? COLORS.errorRed : COLORS.brownLight, textAlign: 'center' });

  if (isWarning) {
    ctx.save(); ctx.globalAlpha = 0.3 + 0.3 * Math.sin(state.animTime * 4);
    ctx.beginPath(); ctx.arc(timerCX, timerCY, timerR + 8, 0, Math.PI * 2);
    ctx.strokeStyle = COLORS.errorRed; ctx.lineWidth = 3; ctx.stroke(); ctx.restore();
  }

  var hintY = top + 240;
  drawRoundRect(pad, hintY, contentW, 56, 10, 'rgba(212,160,23,0.08)', 'rgba(212,160,23,0.15)', 1);
  drawText('💡', pad + 16, hintY + 16, { fontSize: 16 });
  drawText('提示', pad + 40, hintY + 10, { fontSize: 11, fontWeight: '600', color: COLORS.brownLight });
  drawText(currentQ.meaning || '', pad + 40, hintY + 28, { fontSize: 13, color: COLORS.brown, maxWidth: contentW - 60 });

  var slotsY = top + 340, slotSize = 64, slotGap = 12;
  var slotsW = slotSize * 4 + slotGap * 3, slotsX = (screenW - slotsW) / 2;
  var shakeX = state.isShaking ? Math.sin(state.animTime * 40) * 6 : 0;

  for (var si = 0; si < 4; si++) {
    var sx = slotsX + si * (slotSize + slotGap) + shakeX;
    var ch = state.selectedChars[si];
    var borderColor;
    if (state.isAnswerCorrect === true) borderColor = COLORS.green;
    else if (state.isAnswerCorrect === false) borderColor = COLORS.errorRed;
    else borderColor = ch ? COLORS.gold : 'rgba(212,160,23,0.4)';

    drawRoundRect(sx, slotsY, slotSize, slotSize, 14, ch ? COLORS.white : 'rgba(255,255,255,0.6)', borderColor, 2);
    if (ch) {
      drawText(ch, sx + slotSize / 2, slotsY + slotSize / 2, { fontSize: 24, fontWeight: 'bold', color: COLORS.brown, textAlign: 'center', baseline: 'middle' });
      addTouchRegion(sx, slotsY, slotSize, slotSize, (function(idx) { return function() { removeChar(idx); }; })(si));
    }
  }

  if (state.scorePopup) {
    ctx.save(); ctx.globalAlpha = state.scorePopup.opacity;
    drawText(state.scorePopup.text, screenW / 2, slotsY - 20 - (1 - state.scorePopup.opacity) * 30, { fontSize: 16, fontWeight: 'bold', color: COLORS.green, textAlign: 'center' });
    ctx.restore();
  }

  var optsY = top + 440, optSize = 64, optGap = 12;
  var cols = Math.min(state.shuffledOptions.length, 4);
  var optsW = optSize * cols + optGap * (cols - 1);
  var optsStartX = (screenW - optsW) / 2;

  for (var oi = 0; oi < state.shuffledOptions.length; oi++) {
    var optCh = state.shuffledOptions[oi];
    var row = Math.floor(oi / cols), col = oi % cols;
    var ox = optsStartX + col * (optSize + optGap);
    var oy = optsY + row * (optSize + optGap);

    if (!optCh) { ctx.save(); ctx.globalAlpha = 0.3; drawRoundRect(ox, oy, optSize, optSize, 14, 'rgba(0,0,0,0.06)'); ctx.restore(); }
    else {
      drawRoundRect(ox, oy, optSize, optSize, 14, '#C49512');
      drawGradientRect(ox, oy, optSize, optSize, 14, [[0, '#D4A017'], [1, '#B8860B']], 'vertical');
      drawText(optCh, ox + optSize / 2, oy + optSize / 2, { fontSize: 24, fontWeight: 'bold', color: COLORS.white, textAlign: 'center', baseline: 'middle' });
      addTouchRegion(ox, oy, optSize, optSize, (function(c, i) { return function() { selectChar(c, i); }; })(optCh, oi));
    }
  }

  var skipY = screenH - 100;
  drawRoundRect(pad, skipY, contentW, 48, 12, state.skipCount > 0 ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.04)', state.skipCount > 0 ? 'rgba(212,160,23,0.2)' : 'rgba(0,0,0,0.06)', 1);
  drawText('⏭ 跳过本题（剩余' + state.skipCount + '次）', screenW / 2, skipY + 24, { fontSize: 14, fontWeight: '600', color: state.skipCount > 0 ? COLORS.brown : '#CCC', textAlign: 'center', baseline: 'middle' });
  if (state.skipCount > 0) addTouchRegion(pad, skipY, contentW, 48, function() { skipQuestion(); });
}

    drawCircle(pad + 28, py + 18, 14, isUnlocked ? 'rgba(212,160,23,0.2)' : 'rgba(255,255,255,0.06)');
    drawText(IDENTITY_ICONS[i], pad + 28, py + 18, { fontSize: 14, textAlign: 'center', baseline: 'middle' });

    else if (isUnlocked) drawText('已达成', pad + contentW - 16, py + 18, { fontSize: 11, color: 'rgba(255,255,255,0.5)', textAlign: 'right', baseline: 'middle' });

  }
}

function render() {
  if (!ctx) return;
  state.animTime += 0.016;
  if (state.scorePopup) { state.scorePopup.opacity -= 0.02; if (state.scorePopup.opacity <= 0) state.scorePopup = null; }
  ctx.clearRect(0, 0, screenW, screenH);

  switch (state.screen) {
    case 'launch': drawLaunchScreen(); break;
    case 'home': drawHomeScreen(); drawBoostDialog(); break;
    case 'game': drawGameScreen(); drawBoostDialog(); drawVictoryDialog(); drawFailureDialog(); drawDailySuccessDialog(); break;
    case 'identity': drawIdentityScreen(); break;
    case 'profile': drawProfileScreen(); break;
    case 'gift': drawGiftScreen(); break;
  }

  requestAnimationFrame(render);
}

function initCanvas() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');

  function resizeCanvas() {
    var sysInfo = tt.getSystemInfoSync();
    dpr = sysInfo.pixelRatio || 2;
    screenW = sysInfo.windowWidth || 375;
    screenH = sysInfo.windowHeight || 812;
    safeTop = (sysInfo.safeArea && sysInfo.safeArea.top > 0) ? sysInfo.safeArea.top : 20;
    safeBottom = (sysInfo.safeArea && sysInfo.safeArea.bottom > 0) ? sysInfo.safeArea.bottom : 0;
    if (safeTop < 20) safeTop = 20;

    canvas.width = screenW * dpr;
    canvas.height = screenH * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    
    render();
  }

  resizeCanvas();

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', function() {
    setTimeout(resizeCanvas, 100);
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() {
      setTimeout(resizeCanvas, 100);
    });
  }

  tt.onTouchStart(function(res) {
    console.log('[Touch] x:', res.touches[0].clientX, 'y:', res.touches[0].clientY);
    if (res.touches.length > 0) {
      var t = res.touches[0];
      var result = hitTest(t.clientX, t.clientY);
      console.log('[HitTest] result:', result, 'regions:', touchRegions.length);
    }
  });

  loadIdiomsFromSupabase(function(success) {
    if (success) {
      console.log('成语数据加载成功，可以开始游戏');
    } else {
      console.log('成语数据加载失败，使用备用数据');
    }
    
    initRewardAd();
    render();
  });
}

window.onload = initCanvas;

// ==================== 本地存储层（用于 Demo 测试） ====================
const Storage = {
  KEY: 'monkey_idiom_game',
  
  save: function() {
    try {
      localStorage.setItem(this.KEY, JSON.stringify({
        userInfo: state.userInfo,
        gameHistory: state.gameHistory,
        dailyChallenge: state.dailyChallengeHistory,
        lastPlayDate: new Date().toISOString().split('T')[0]
      }));
    } catch (e) {
      console.warn('Storage save failed:', e);
    }
  },
  
  load: function() {
    try {
      const data = localStorage.getItem(this.KEY);
      if (data) {
        const parsed = JSON.parse(data);
        if (parsed.userInfo) {
          Object.assign(state.userInfo, parsed.userInfo);
        }
        if (parsed.gameHistory) {
          state.gameHistory = parsed.gameHistory;
        }
        if (parsed.dailyChallenge) {
          state.dailyChallengeHistory = parsed.dailyChallenge;
        }
        return true;
      }
    } catch (e) {
      console.warn('Storage load failed:', e);
    }
    return false;
  },
  
  clear: function() {
    localStorage.removeItem(this.KEY);
  },
  
  getUserId: function() {
    return state.userInfo.openid || 'local_user_' + Date.now();
  }
};

// 修改数据更新时自动保存
const originalSetState = function() {};
function setupAutoSave() {
  const originalUpdateUserPoints = window.updateUserPoints;
  if (originalUpdateUserPoints) {
    window.updateUserPoints = function(points) {
      originalUpdateUserPoints(points);
      Storage.save();
    };
  }
  
  const originalCompleteGame = window.completeGame;
  if (originalCompleteGame) {
    window.completeGame = function() {
      originalCompleteGame();
      Storage.save();
    };
  }
}

// 初始化时加载数据
setTimeout(function() {
  Storage.load();
  setupAutoSave();
  console.log('Game data loaded from localStorage');
}, 100);
</script>
