<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成语哆哆 - 后台管理系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eaeaea; min-height: 100vh; }
    .header { background: #16213e; padding: 20px 30px; border-bottom: 1px solid rgba(212,160,23,0.2); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; color: #D4A017; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .user-info { display: flex; align-items: center; gap: 10px; padding: 8px 16px; background: rgba(255,255,255,0.05); border-radius: 20px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #D4A017; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; }
    .main { display: flex; min-height: calc(100vh - 70px); }
    .sidebar { width: 200px; background: #16213e; padding: 20px 0; }
    .menu-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #a0a0a0; border-left: 3px solid transparent; }
    .menu-item:hover { background: rgba(212,160,23,0.1); color: #eaeaea; }
    .menu-item.active { background: rgba(212,160,23,0.15); color: #D4A017; border-left-color: #D4A017; }
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .page { display: none; }
    .page.active { display: block; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 20px; font-weight: 500; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid rgba(212,160,23,0.2); }
    .stat-label { font-size: 13px; color: #a0a0a0; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: bold; color: #D4A017; }
    .card { background: #16213e; border-radius: 12px; border: 1px solid rgba(212,160,23,0.2); overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid rgba(212,160,23,0.2); display: flex; justify-content: space-between; align-items: center; }
    .card-title { font-size: 16px; font-weight: 500; }
    .card-body { padding: 0; }
    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(212,160,23,0.2); }
    .table th { background: rgba(0,0,0,0.2); font-weight: 500; font-size: 13px; color: #a0a0a0; }
    .table tr:hover td { background: rgba(212,160,23,0.05); }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-success { background: rgba(39,174,96,0.2); color: #27ae60; }
    .badge-warning { background: rgba(243,156,18,0.2); color: #f39c12; }
    .badge-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .badge-primary { background: rgba(212,160,23,0.2); color: #D4A017; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-primary { background: #D4A017; color: #000; }
    .btn-primary:hover { background: #B8860B; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-group { display: flex; gap: 6px; }
    .search-input { padding: 10px 16px; border-radius: 8px; border: 1px solid rgba(212,160,23,0.2); background: rgba(255,255,255,0.05); color: #eaeaea; font-size: 14px; width: 200px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: #a0a0a0; margin-bottom: 6px; }
    .form-input, .form-select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(212,160,23,0.2); background: rgba(255,255,255,0.05); color: #eaeaea; font-size: 14px; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: #16213e; border-radius: 16px; width: 90%; max-width: 500px; max-height: 80vh; overflow: auto; }
    .modal-header { padding: 20px; border-bottom: 1px solid rgba(212,160,23,0.2); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 18px; font-weight: 500; }
    .modal-close { background: none; border: none; color: #a0a0a0; font-size: 24px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px; border-top: 1px solid rgba(212,160,23,0.2); display: flex; justify-content: flex-end; gap: 12px; }
    .tab-bar { display: flex; gap: 4px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 8px; margin-bottom: 20px; }
    .tab-btn { padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: #a0a0a0; cursor: pointer; font-size: 13px; }
    .tab-btn.active { background: #D4A017; color: #000; }
  </style>
</head>
<body>
  <header class="header">
    <h1>🐵 成语哆哆 - 后台管理</h1>
    <div class="header-right">
      <div class="user-info">
        <div class="avatar">A</div>
        <span>管理员</span>
      </div>
    </div>
  </header>
  
  <div class="main">
    <nav class="sidebar">
      <div class="menu-item active" data-page="dashboard">📊 数据概览</div>
      <div class="menu-item" data-page="users">👥 用户管理</div>
      <div class="menu-item" data-page="questions">📝 成语题库</div>
      <div class="menu-item" data-page="daily">📅 每日挑战</div>
      <div class="menu-item" data-page="ads">📺 广告数据</div>
      <div class="menu-item" data-page="settings">⚙️ 系统设置</div>
    </nav>
    
    <main class="content">
      <div class="page active" id="page-dashboard">
        <div class="page-header">
          <h2 class="page-title">数据概览</h2>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">总用户数</div><div class="stat-value" id="stat-users">-</div></div>
          <div class="stat-card"><div class="stat-label">今日活跃用户</div><div class="stat-value">-</div></div>
          <div class="stat-card"><div class="stat-label">今日游戏次数</div><div class="stat-value">-</div></div>
          <div class="stat-card"><div class="stat-label">今日完成挑战</div><div class="stat-value">-</div></div>
        </div>
      </div>
      
      <div class="page" id="page-users">
        <div class="page-header">
          <h2 class="page-title">用户管理</h2>
          <input type="text" class="search-input" placeholder="搜索用户...">
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">用户列表</span></div>
          <div class="card-body">
            <table class="table"><thead><tr><th>头像</th><th>ID</th><th>昵称</th><th>身份</th><th>积分</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead>
            <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
      
      <div class="page" id="page-questions">
        <div class="page-header">
          <h2 class="page-title">成语题库</h2>
          <button class="btn btn-primary" onclick="showAddIdiom()">+ 添加成语</button>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">成语列表</span>
            <div class="tab-bar">
              <button class="tab-btn active">全部</button>
              <button class="tab-btn">简单</button>
              <button class="tab-btn">中等</button>
              <button class="tab-btn">困难</button>
            </div>
          </div>
          <div class="card-body">
            <table class="table"><thead><tr><th>ID</th><th>成语</th><th>释义</th><th>难度</th><th>操作</th></tr></thead>
            <tbody id="idioms-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
      
      <div class="page" id="page-daily">
        <div class="page-header"><h2 class="page-title">每日挑战数据</h2></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">今日参与人数</div><div class="stat-value" id="daily-players">-</div></div>
          <div class="stat-card"><div class="stat-label">完成人数</div><div class="stat-value" id="daily-passed">-</div></div>
          <div class="stat-card"><div class="stat-label">完成率</div><div class="stat-value" id="daily-rate">-</div></div>
          <div class="stat-card"><div class="stat-label">平均连胜</div><div class="stat-value" id="daily-streak">-</div></div>
        </div>
      </div>
      
      <div class="page" id="page-ads">
        <div class="page-header"><h2 class="page-title">广告数据</h2></div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">今日广告展示</div><div class="stat-value">-</div></div>
          <div class="stat-card"><div class="stat-label">今日收益</div><div class="stat-value">-</div></div>
        </div>
      </div>
      
      <div class="page" id="page-settings">
        <div class="page-header"><h2 class="page-title">系统设置</h2></div>
        <div class="card" style="max-width:500px">
          <div class="card-header"><span class="card-title">基本设置</span></div>
          <div class="card-body" style="padding:20px">
            <div class="form-group"><label class="form-label">游戏名称</label><input type="text" class="form-input" value="成语哆哆"></div>
            <div class="form-group"><label class="form-label">每局游戏时间(秒)</label><input type="number" class="form-input" value="10"></div>
            <button class="btn btn-primary">保存设置</button>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <div class="modal-overlay" id="modal-add-idiom">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">添加成语</span><button class="modal-close" onclick="closeModal('modal-add-idiom')">×</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">成语</label><input type="text" class="form-input" id="new-idiom" placeholder="例如: 一心一意"></div>
        <div class="form-group"><label class="form-label">释义</label><input type="text" class="form-input" id="new-meaning" placeholder="例如: 只有一个心思"></div>
        <div class="form-group"><label class="form-label">难度</label><select class="form-select" id="new-difficulty"><option value="1">简单</option><option value="2">中等</option><option value="3">困难</option></select></div>
      </div>
      <div class="modal-footer">
        <button class="btn" style="background:rgba(255,255,255,0.1)" onclick="closeModal('modal-add-idiom')">取消</button>
        <button class="btn btn-primary" onclick="addIdiom()">添加</button>
      </div>
    </div>
  </div>
  
  <script>
    var SUPABASE_URL = 'https://gccndjqkglzgpuutyecw.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjY25kanFrZ2x6Z3B1dXR5ZWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MDE3OTQsImV4cCI6MjA5Mzk3Nzc5NH0.FBuVMuuQa8tVvaLdRrPYq33ehoNSSwVsx7oMxl8rjlQ';
    
    function api(url, opts) {
      return fetch(SUPABASE_URL + url, {
        method: opts && opts.method ? opts.method : 'GET',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: opts && opts.body ? JSON.stringify(opts.body) : null
      }).then(function(r) { return r.json(); });
    }
    
    function loadStats() {
      api('/rest/v1/users?select=id').then(function(data) {
        var el = document.getElementById('stat-users');
        if (el && data) el.textContent = data.length || 0;
      });
    }
    
    function loadUsers() {
      api('/rest/v1/users?select=*&order=created_at.desc&limit=50').then(function(data) {
        var tbody = document.getElementById('users-tbody');
        if (!tbody) return;
        if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#a0a0a0">暂无数据</td></tr>'; return; }
        var identities = ['书生','童生','秀才','举人','进士','探花','榜眼','状元','大宗师'];
        var html = '';
        for (var i = 0; i < data.length; i++) {
          var u = data[i];
          var status = u.user_status === 0 ? '<span class="badge badge-success">正常</span>' : '<span class="badge badge-danger">禁用</span>';
          var avatarHtml = u.avatar_url ? '<img src="' + u.avatar_url + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover" onerror="this.style.display=\'none\'">' : '<div style="width:32px;height:32px;border-radius:50%;background:#D4A017;display:flex;align-items:center;justify-content:center;font-size:14px;color:#000;font-weight:bold">' + (u.nickname ? u.nickname.charAt(0) : '?') + '</div>';
          html += '<tr><td>' + avatarHtml + '</td><td>' + (u.id||'').substring(0,8) + '</td><td>' + (u.nickname||'玩家') + '</td><td><span class="badge badge-primary">' + (identities[u.identity_level]||'书生') + '</span></td><td>' + (u.total_points||0) + '</td><td>' + status + '</td><td>' + (u.created_at ? u.created_at.split('T')[0] : '-') + '</td><td><div class="btn-group"><button class="btn btn-sm btn-primary">详情</button><button class="btn btn-sm btn-danger">禁用</button></div></td></tr>';
        }
        tbody.innerHTML = html;
      });
    }
    
    function loadIdioms() {
      api('/rest/v1/idioms?select=*&order=created_at.desc&limit=100').then(function(data) {
        var tbody = document.getElementById('idioms-tbody');
        if (!tbody) return;
        if (!data || data.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#a0a0a0">暂无数据</td></tr>'; return; }
        var diffLabels = {1:'简单',2:'中等',3:'困难'};
        var diffClass = {1:'badge-success',2:'badge-warning',3:'badge-danger'};
        var html = '';
        for (var i = 0; i < data.length; i++) {
          var item = data[i];
          var d = item.difficulty || 1;
          html += '<tr><td>' + (i+1) + '</td><td>' + (item.idiom||'') + '</td><td>' + (item.explanation||'-') + '</td><td><span class="badge ' + diffClass[d] + '">' + diffLabels[d] + '</span></td><td><div class="btn-group"><button class="btn btn-sm btn-primary">编辑</button><button class="btn btn-sm btn-danger">删除</button></div></td></tr>';
        }
        tbody.innerHTML = html;
      });
    }
    
    function showAddIdiom() { document.getElementById('modal-add-idiom').classList.add('active'); }
    
    function addIdiom() {
      var idiom = document.getElementById('new-idiom').value.trim();
      var meaning = document.getElementById('new-meaning').value.trim();
      var diff = parseInt(document.getElementById('new-difficulty').value);
      if (!idiom) { alert('请输入成语'); return; }
      api('/rest/v1/idioms', { method: 'POST', body: { idiom: idiom, explanation: meaning, difficulty: diff } }).then(function() {
        closeModal('modal-add-idiom');
        loadIdioms();
        document.getElementById('new-idiom').value = '';
        document.getElementById('new-meaning').value = '';
      });
    }
    
    function loadDailyStats() {
      var today = new Date().toISOString().split('T')[0];
      // 只统计有 user_id 的真实用户记录
      api('/rest/v1/game_history?select=*&play_date=eq.' + today + '&user_id.not.is.null').then(function(data) {
        var playersEl = document.getElementById('daily-players');
        var passedEl = document.getElementById('daily-passed');
        var rateEl = document.getElementById('daily-rate');
        var streakEl = document.getElementById('daily-streak');
        if (!playersEl) return;
        if (!data || data.length === 0) {
          playersEl.textContent = '0';
          passedEl.textContent = '0';
          rateEl.textContent = '0%';
          streakEl.textContent = '0';
          return;
        }
        var totalPlayers = data.length;
        var passedCount = 0;
        var totalStreak = 0;
        for (var i = 0; i < data.length; i++) {
          if (data[i].is_passed) passedCount++;
          totalStreak += data[i].consecutive_wins || 0;
        }
        playersEl.textContent = totalPlayers;
        passedEl.textContent = passedCount;
        rateEl.textContent = Math.round(passedCount / totalPlayers * 100) + '%';
        streakEl.textContent = (totalStreak / totalPlayers).toFixed(1);
      });
    }
    
    window.openModal = function(id) { var el = document.getElementById(id); if (el) el.classList.add('active'); };
    window.closeModal = function(id) { var el = document.getElementById(id); if (el) el.classList.remove('active'); };
    
    // 菜单点击
    var menuItems = document.querySelectorAll('.menu-item');
    for (var i = 0; i < menuItems.length; i++) {
      menuItems[i].onclick = function() {
        var page = this.getAttribute('data-page');
        for (var j = 0; j < menuItems.length; j++) menuItems[j].classList.remove('active');
        this.classList.add('active');
        var pages = document.querySelectorAll('.page');
        for (var k = 0; k < pages.length; k++) pages[k].classList.remove('active');
        document.getElementById('page-' + page).classList.add('active');
        if (page === 'dashboard') loadStats();
        if (page === 'users') loadUsers();
        if (page === 'questions') loadIdioms();
        if (page === 'daily') loadDailyStats();
      };
    }
    
    // 初始化
    loadStats();
  </script>
</body>
</html>
